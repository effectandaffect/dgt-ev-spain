name: Daily DGT Data Update

on:
  push:
    branches: [main]
    paths-ignore:
      - "web/public/data/**"  # evitar loop: el bot también hace push de JSONs
  schedule:
    # La DGT publica tarde. Ejecutamos a las 21:00 UTC (23:00 CEST / 22:00 CET)
    - cron: "0 21 * * 1-5"
  workflow_dispatch:
    inputs:
      since:
        description: "Reconstruir desde fecha (YYYY-MM-DD). Vacío = solo hoy"
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Download and process DGT data
        run: |
          cd pipeline
          if [ -n "${{ github.event.inputs.since }}" ]; then
            python main.py --since "${{ github.event.inputs.since }}"
          else
            python main.py
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Node dependencies
        run: npm ci
        working-directory: web

      - name: Build Next.js static site
        run: npm run build
        working-directory: web
        env:
          NODE_ENV: production

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit updated JSON data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/*.json
          if git diff --staged --quiet; then
            echo "No hay cambios en los datos."
          else
            git commit -m "chore: actualizar datos DGT $(date -u +%Y-%m-%d)"
            git push
          fi
